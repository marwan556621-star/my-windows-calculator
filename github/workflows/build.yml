name: Build Windows App
on: [push, workflow_dispatch]
env:
  FLET_CLI_NO_RICH_OUTPUT: 1
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Blindfold Pre-installed Anaconda
        shell: pwsh
        run: |
          # Instantly rename the server's Anaconda folders so background tools can't find them
          if (Test-Path "C:\Miniconda") { Rename-Item -Path "C:\Miniconda" -NewName "C:\HiddenConda" -Force -ErrorAction SilentlyContinue }
          if (Test-Path "C:\Miniconda3") { Rename-Item -Path "C:\Miniconda3" -NewName "C:\HiddenConda3" -Force -ErrorAction SilentlyContinue }
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flet
        run: pip install flet

      - name: Build Windows EXE
        run: python -m flet build windows --verbose
        
      - uses: actions/upload-artifact@v4
        with:
          name: my-windows-calculator
          path: build/windows/
