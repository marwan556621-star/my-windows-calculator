name: Build Windows App
on: [push, workflow_dispatch]
env:
  FLET_CLI_NO_RICH_OUTPUT: 1
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flet
        shell: pwsh
        run: |
          # Forcefully remove Anaconda paths from the server's memory
          $env:Path = ($env:Path -split ';' | Where-Object { $_ -notmatch 'Conda' -and $_ -notmatch 'Anaconda' }) -join ';'
          python -m pip install flet

      - name: Build Windows EXE
        shell: pwsh
        run: |
          # Forcefully remove Anaconda paths again before building
          $env:Path = ($env:Path -split ';' | Where-Object { $_ -notmatch 'Conda' -and $_ -notmatch 'Anaconda' }) -join ';'
          python -m flet build windows --verbose
        
      - uses: actions/upload-artifact@v4
        with:
          name: my-windows-calculator
          path: build/windows/
