name: Build Windows App
on: [push, workflow_dispatch]
env:
  FLET_CLI_NO_RICH_OUTPUT: 1
  PYTHONUTF8: 1
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Blindfold Pre-installed Anaconda
        shell: pwsh
        run: |
          # Keep Anaconda hidden so it doesn't hijack the build
          if (Test-Path "C:\Miniconda") { Rename-Item -Path "C:\Miniconda" -NewName "C:\HiddenConda" -Force -ErrorAction SilentlyContinue }
          if (Test-Path "C:\Miniconda3") { Rename-Item -Path "C:\Miniconda3" -NewName "C:\HiddenConda3" -Force -ErrorAction SilentlyContinue }
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet
        run: pip install flet

      - name: Detect Flutter Version Needed
        shell: bash
        run: |
          # Ask Flet exactly what version it requires to avoid crashes
          FLUTTER_VER=$(python -c "import flet.version; print(flet.version.flutter_version)")
          echo "FLUTTER_VER=$FLUTTER_VER" >> $GITHUB_ENV

      - name: Install Exact Flutter Version
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VER }}
          channel: 'stable'
          cache: true

      - name: Build Windows EXE
        run: flet build windows --verbose
        
      - uses: actions/upload-artifact@v4
        with:
          name: my-windows-calculator
          path: build/windows/
